<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#F0F4FF" />

  <!-- Body -->
  <rect x="55" y="160" width="90" height="70" rx="20" fill="#3B5BDB" />

  <!-- Neck -->
  <rect x="85" y="148" width="30" height="20" rx="8" fill="#FFCBA4" />

  <!-- Head -->
  <ellipse cx="100" cy="125" rx="42" ry="45" fill="#FFCBA4" />

  <!-- Hair -->
  <ellipse cx="100" cy="90" rx="42" ry="22" fill="#2C2C2C" />
  <rect x="58" y="88" width="10" height="28" rx="5" fill="#2C2C2C" />
  <rect x="132" y="88" width="10" height="28" rx="5" fill="#2C2C2C" />

  <!-- Eyes (calm) -->
  <ellipse cx="83" cy="120" rx="6" ry="7" fill="white" />
  <ellipse cx="117" cy="120" rx="6" ry="7" fill="white" />
  <circle cx="84" cy="121" r="4" fill="#2C2C2C" />
  <circle cx="118" cy="121" r="4" fill="#2C2C2C" />
  <circle cx="85" cy="120" r="1.5" fill="white" />
  <circle cx="119" cy="120" r="1.5" fill="white" />

  <!-- Eyebrows -->
  <path d="M77 112 Q83 109 89 112" stroke="#2C2C2C" stroke-width="2" stroke-linecap="round" fill="none" />
  <path d="M111 112 Q117 109 123 112" stroke="#2C2C2C" stroke-width="2" stroke-linecap="round" fill="none" />

  <!-- Nose -->
  <ellipse cx="100" cy="132" rx="4" ry="3" fill="#F0A882" />

  <!-- Mouth (neutral, slightly open) -->
  <path d="M90 143 Q100 147 110 143" stroke="#C97B5A" stroke-width="2" stroke-linecap="round" fill="none" />

  <!-- Collar / tie -->
  <path d="M80 165 L100 175 L120 165" stroke="white" stroke-width="2" fill="none" />
  <path d="M97 175 L100 195 L103 175" fill="#1A3BB0" />

  <!-- State badge -->
  <rect x="60" y="215" width="80" height="20" rx="10" fill="#E8EDFF" />
  <text x="100" y="229" text-anchor="middle" font-size="10" font-family="system-ui, sans-serif" fill="#3B5BDB" font-weight="600">Idle</text>
</svg>
