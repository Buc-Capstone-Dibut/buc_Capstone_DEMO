services:
  - type: web
    name: dibut-ai-interview
    runtime: python
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run --frozen --no-dev --no-sync uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: CORS_ORIGINS
        value: https://your-vercel-app.vercel.app
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
